<!DOCTYPE html>
<html> 
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập</title>
    <link rel="stylesheet" href="../assets/admin/css/style.css">
  </head>
  <body> 
    <div class="page-account"> 
      <div class="form-account">
        <div class="inner-title"> 
          <h1 class="inner-head">Đăng nhập</h1><span class="inner-desc">Vui lòng nhập email và mật khẩu để tiếp tục</span>
        </div>
        <form class="inner-form" id="login-form">
          <div class="inner-group">
            <label class="inner-label" for="email">Email</label>
            <input class="inner-control" type="email" name="email" id="email" placeholder="Ví dụ: levana@gmail.com" autocomplete="email">
          </div>
          <div class="inner-group"> 
            <label class="inner-label" for="password">Mật khẩu</label>
            <input class="inner-control" type="password" name="password" id="password" autocomplete="current-password">
          </div>
          <div class="inner-meta">
            <div class="inner-confirm">
              <input class="inner-check" type="checkbox" name="" id="tick">
              <label class="inner-label" for="tick">Nhớ mật khẩu</label>
            </div>
            <div class="inner-forgot"><a href="#">Quên mật khẩu?</a></div>
          </div>
          <div class="inner-error" id="js-login-error" style="display:none; color:#dc2626; margin-bottom:12px;"></div>
          <div class="inner-login">
            <button class="inner-button" type="submit">Đăng Nhập</button>
          </div>
        </form>
        <div class="inner-creating"><span class="inner-desc">Bạn chưa có tài khoản?</span><a class="inner-account-create" href="#">Tạo tài khoản</a></div>
      </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://unpkg.com/just-validate@latest/dist/just-validate.production.min.js"></script>
    <script src="../assets/admin/js/utils/http.js"></script>
    <script src="../assets/admin/js/api/user.api.js"></script>
    <script src="../assets/admin/js/pages/login.js"></script>
  </body>
</html>
