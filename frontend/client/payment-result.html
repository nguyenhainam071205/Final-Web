<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kết quả thanh toán</title>
    <link rel="stylesheet" href="../assets/client/css/style-1.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        .payment-result { min-height: 60vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
        .payment-result .inner-card { max-width: 480px; width: 100%; background: #fff; border-radius: 12px; padding: 32px; box-shadow: 0 4px 16px rgba(0,0,0,.06); text-align: center; }
        .payment-result .inner-icon { font-size: 48px; margin-bottom: 16px; }
        .payment-result .inner-icon.success { color: #16a34a; }
        .payment-result .inner-icon.fail { color: #dc2626; }
        .payment-result .inner-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
        .payment-result .inner-desc { color: #555; margin-bottom: 8px; }
        .payment-result .inner-trans { color: #888; font-size: 14px; margin-bottom: 24px; }
        .payment-result .inner-actions a { display: inline-block; padding: 10px 20px; border-radius: 8px; text-decoration: none; margin: 4px; }
        .payment-result .inner-actions .btn-primary { background: #2563eb; color: #fff; }
        .payment-result .inner-actions .btn-secondary { background: #e5e7eb; color: #111; }
    </style>
</head>
<body>
    <div class="payment-result">
        <div class="inner-card" id="js-result-card">
            <div class="inner-icon" id="js-result-icon"><i class="fa-solid fa-circle-notch fa-spin"></i></div>
            <div class="inner-title" id="js-result-title">Đang xác thực thanh toán…</div>
            <div class="inner-desc" id="js-result-desc">Vui lòng đợi trong giây lát.</div>
            <div class="inner-trans" id="js-result-trans"></div>
            <div class="inner-actions">
                <a class="btn-primary" href="index.html">Về trang chủ</a>
                <a class="btn-secondary" href="cart.html">Xem giỏ hàng</a>
            </div>
        </div>
    </div>

    <script>
        (function () {
            const params = new URLSearchParams(window.location.search);
            const status       = params.get('status');
            const appTransId   = params.get('apptransid') || params.get('app_trans_id');
            const amount       = params.get('amount');

            const $icon  = document.getElementById('js-result-icon');
            const $title = document.getElementById('js-result-title');
            const $desc  = document.getElementById('js-result-desc');
            const $trans = document.getElementById('js-result-trans');

            if (appTransId) $trans.textContent = 'Mã giao dịch: ' + appTransId;

            // ZaloPay redirects with ?status=1 on success.
            if (String(status) === '1') {
                $icon.className = 'inner-icon success';
                $icon.innerHTML = '<i class="fa-solid fa-circle-check"></i>';
                $title.textContent = 'Thanh toán thành công';
                $desc.textContent  = amount
                    ? 'Đã ghi nhận thanh toán ' + Number(amount).toLocaleString('vi-VN') + 'đ.'
                    : 'Cảm ơn bạn đã đặt tour!';
            } else if (status !== null) {
                $icon.className = 'inner-icon fail';
                $icon.innerHTML = '<i class="fa-solid fa-circle-xmark"></i>';
                $title.textContent = 'Thanh toán không thành công';
                $desc.textContent  = 'Bạn có thể thử lại từ trang giỏ hàng.';
            }
        })();
    </script>
</body>
</html>
